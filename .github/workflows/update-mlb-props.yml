name: Update MLB Props CSV

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-csv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate fresh props.csv
        run: node scripts/update-props.js
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Force commit and push CSV
        run: |
          git config user.name "925Sports Bot"
          git config user.email "bot@925sports.com"
          
          # Force add and commit even if no changes detected
          git add data/props.csv
          git commit -m "Updated props.csv - $(date +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes detected - forcing commit"
          git push
