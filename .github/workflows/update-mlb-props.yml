name: Update MLB Props Every 5 Minutes

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

# ←←← THIS IS THE FIX
permissions:
  contents: write
# ←←← THIS IS THE FIX

jobs:
  fetch-and-save:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch latest MLB props
        run: node scripts/update-props.js
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Commit & push updated data
        run: |
          git config user.name "925Sports Bot"
          git config user.email "bot@925sports.com"
          git add data/props.json
          git commit -m "Auto-update MLB props - $(date)" || echo "No changes"
          git push
