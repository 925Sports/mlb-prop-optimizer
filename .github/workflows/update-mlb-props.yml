name: Update MLB Props CSV + Google Sheet

on:
  workflow_dispatch:     # Manual for now

permissions:
  contents: write

jobs:
  update-csv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate fresh props.csv
        run: node scripts/update-props.js
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

      - name: Send data to Google Sheet
        run: |
          echo "Sending $(wc -c < data/props.csv) bytes to Google Sheet..."
          RESPONSE=$(curl -L -s -X POST \
            -H "Content-Type: text/csv" \
            --data-binary @data/props.csv \
            "${{ secrets.GOOGLE_WEBHOOK_URL }}")
          echo "Google Sheet Response: $RESPONSE"
        env:
          GOOGLE_WEBHOOK_URL: https://script.google.com/macros/s/AKfycbxGdmSHuqHg2EyFSKOxU3tLkg6FjRXw7F3pztnDKO5YdadBbuzcVJyjMRN2s9xvA3Bd/exec

      - name: Commit & push CSV
        run: |
          git config user.name "925Sports Bot"
          git config user.email "bot@925sports.com"
          git add data/props.csv
          git commit -m "Auto-update props.csv - $(date)" || echo "No changes"
          git push
